name: Авто-тест симулятора чачки
on:
    push:
        branches: [ "main" ]
    pull_request:
        branches: [ "main" ]

jobs:
    lint-and-test:
        runs-on: ubuntu-latest

        steps:
        - name: Чтение репозитория
          uses: actions/checkout@v7

        - name: Установка Python 3.14
          uses: actions/setup-python@v6
          with:
              python-version: '3.14'

        - name: Установка всех зависимостей
          run: |
              python -m pip install --upgrade pip
              if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi

        - name: Установка инструментов (Flake8, MyPy, Bandit, isort)
          run: |
              python -m pip install flake8 mypy bandit isort

        - name: Проверка синтаксиса (Flake8)
          run: |
              python -m flake8 . --count --select=E9,F401,F821,F841,E225 --show-source --statistics

        - name: Проверка порядка импортов (isort)
          run: |
              isort . --check-only --diff

        - name: Проверка типов (MyPy)
          run: |
              mypy . --ignore-missing-imports

        - name: Проверка уязвимостей (Bandit)
          run: |
              bandit -r .