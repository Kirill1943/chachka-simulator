name: Авто-тест симулятора чачки
on:
    push:
        branches: [ "main" ]
    pull_request:
        branches: [ "main" ]

jobs:
    lint-and-test:
        runs-on: ubuntu-latest

        steps:
        - name: Чтение репозитория
          uses: actions/checkout@v7.0.1

        - name: Установка Python 3.14
          uses: actions/setup-python@v7.0.0
          with:
              python-version: '3.14'

        - name: Установка всех зависимостей [1 / 6]
          run: |
              python -m pip install --upgrade pip
              python manage.py install

        - name: Установка инструментов (Flake8, MyPy, Bandit, isort) [2 / 6]
          run: |
              python -m pip install flake8 mypy bandit isort

        - name: Проверка синтаксиса (Flake8) [3 / 6]
          run: |
              python -m flake8 . --count --select=E9,F401,F821,F841,E225 --show-source --statistics

        - name: Проверка порядка импортов (isort) [4 / 6]
          run: |
              isort . --check-only --diff

        - name: Проверка типов (MyPy) [5 / 6]
          run: |
              mypy . --ignore-missing-imports

        - name: Проверка уязвимостей (Bandit) [6 / 6]
          run: |
              bandit -r . -ll